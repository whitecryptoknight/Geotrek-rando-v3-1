name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Dokploy deploy
        run: |
          curl -X POST \
            -H "x-webhook-token: ${{ secrets.DOKPLOY_WEBHOOK_SECRET }}" \
            "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
